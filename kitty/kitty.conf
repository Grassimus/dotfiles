# ============ FONTS ============
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Disable ligatures
disable_ligatures never

# ============ CURSOR ============
cursor_shape           beam
cursor_beam_thickness  1.6
cursor_blink_interval  0.5
cursor_stop_blinking_after 5.0
cursor_trail 1

# ============ SCROLLBACK ============
scrollback_lines 2000
wheel_scroll_min_lines 1
# Open scrollback in your pager (uses $PAGER or less by default)
scrollback_pager_history_size 10

# ============ MOUSE ============
mouse_hide_wait 3.0
copy_on_select  yes
strip_trailing_spaces smart
# Open URLs on click with the default handler (xdg-open on Wayland)
url_style curly
open_url_with default
detect_urls yes

# ============ TERMINAL BELL ============
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# ============ WINDOW LAYOUT ============
# Let Hyprland draw the borders/title
hide_window_decorations yes

# Padding inside the terminal. Hyprland gaps handle outer spacing;
# this is the breathing room between the border and your text.
window_padding_width 10

# Keep the opacity even when the window is unfocused (optional)
dynamic_background_opacity yes

# Don't nag on close, and don't restore old sizes on a tiler
confirm_os_window_close 0
remember_window_size    no
# initial size is mostly ignored under a tiling WM, but set anyway
initial_window_width  90c
initial_window_height 28c

# ============ TAB BAR ============
tab_bar_edge         bottom
tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_min_tabs     2
tab_title_template   "{index}: {title}"

# ============ PERFORMANCE ============
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# ============ SHELL INTEGRATION ============
# Enables prompt marks, cwd tracking, etc. "no-cursor" avoids kitty
# overriding your shell's cursor shape.
shell_integration enabled no-cursor

# ============ KEYBINDINGS ============
# Tabs
map ctrl+shift+t  new_tab_with_cwd
map ctrl+shift+q  close_tab


# ============ COLOR SCHEME ============
# Swap this block for any theme you like. `kitten themes` has a picker

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

# Override the theme
background #000000
background_opacity 0.7
